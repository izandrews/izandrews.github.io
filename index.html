<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.jsdelivr.net/npm/jquery"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery.terminal/js/jquery.terminal.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery.terminal/css/jquery.terminal.min.css" />
  <link rel="stylesheet" href="index.css" />
</head>

<body>
  <div id="mobile-title">
    <img src="SVG/name.svg" alt="iz andrews" />
  </div>

  <template id="desktop-greeting">
    _                   __                 
    ____   ___ ____ ___/ _______ _    _____
   / /_ /  / _ `/ _ / _  / __/ -_| |/|/ _-
  /_//__/  \_,_/_//_\_,_/_/  \__/|__,__/___/

  An alarm rings and you wake to find yourself in a strange room.
  You have none of your usual worldly possessions...
  only a letter addressed simply to 'you'

  - this website is based off my favourite infocom games.
  - if you are unsure, type help for available commands
  </template>

  <template id="mobile-greeting">
  An alarm rings and you wake to find yourself
  in a strange room.

  You have none of your usual worldly possessions...
  only a letter addressed simply to 'you'

  - based off my favourite infocom games
  - type help for available commands
  </template>

  <script>
    const inventory = ['-A letter'];

    const isMobile = window.innerWidth <= 600;
    const greeting = isMobile
      ? document.getElementById('mobile-greeting').innerHTML
      : document.getElementById('desktop-greeting').innerHTML;

    $('body').terminal({
      hello: function() {
        this.echo('hey!');
      },

      read: function(object) {
        if (object === 'letter' || object === 'Letter') {
          this.echo(
`Hi Reader! Welcome to my website.

I'm Iz, a student of Interaction Design Arts
with Creative Computing at UAL.

Here you will find my current projects.
Please peruse at your leisure.

If you would like to get in touch about my work,
please email: isabelcandrews@outlook.com

Any good adventure starts with a look around the room!
`
          );
        } else {
          this.echo("I can't read that!\n");
        }
      },

      i: function() {
        this.echo('You are carrying:');
        this.echo(inventory.join('\n'));
        this.echo('\n');
      },

      inventory: function() {
        this.echo('You are carrying:\nA letter\n');
      },

      help: function() {
        this.echo('Available commands:\nlook\ninventory\nread\nhello\nroll\n');
      },

      look: function() {
        this.echo(
`PECULIAR STUDY

You find yourself in a small study
with no clear exit or entrance.

In the middle of the room is an
antique writing desk.

On the desk is a worn teddy bear,
a jar of seeds, a strange gadget
& a pair of dice.
`
        );
      },

      take: function(object) {
        if (object === 'letter' || object === 'Letter') {
          this.echo("You already have that!\n");
        } else if (
          object === 'teddy' ||
          object === 'teddy bear' ||
          object === 'worn teddy' ||
          object === 'worn teddy bear' ||
          object === 'Teddy' ||
          object === 'Teddy Bear' ||
          object === 'bear' ||
          object === 'Bear'
        ) {
          window.location.href = "/qoa.html";
        } else if (
          object === 'gadget' ||
          object === 'strange gadget' ||
          object === 'Gadget' ||
          object === 'Strange Gadget'
        ) {
          window.location.href = "/ispy.html";
        } else if (
          object === 'jar' ||
          object === 'seeds' ||
          object === 'jar of seeds' ||
          object === 'Jar of Seeds'
        ) {
          window.location.href = "/sowwhat.html";
        } else if (object === 'dice' || object === 'Dice') {
          this.echo("Taken.\n");
          inventory.push("-A set of dice");
        } else {
          this.echo("You can't take that!\n");
        }
      },

      roll: function(object) {
        if (object === 'dice' || object === 'Dice') {
          const random = Math.floor(Math.random() * 3) + 1;
          this.echo("Rolling the dice ... ... ...");

          switch (random) {
            case 1:
              setTimeout(() => window.location.href = "/qoa.html", 1500);
              break;
            case 2:
              setTimeout(() => window.location.href = "/ispy.html", 1500);
              break;
            case 3:
              setTimeout(() => window.location.href = "/sowwhat.html", 1500);
              break;
          }
        } else {
          this.echo("I don't know how to roll that!");
        }
      }
    }, {
      greetings: greeting
    });
  </script>
</body>
</html>
